<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strategic Painting Pros LLC</title>

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#0a1122,#0d1830);
  color:white;
}

.wrap{
  max-width:500px;
  margin:auto;
  padding:16px;
}

.hero{
  background:linear-gradient(135deg,#0b2b84,#173fa6);
  border-radius:20px;
  padding:30px 20px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,255,255,.2);
}

.card{
  background:white;
  color:#111;
  border-radius:20px;
  padding:20px;
  margin-top:20px;
}

.btn{
  display:block;
  width:100%;
  padding:16px;
  margin-top:12px;
  border-radius:14px;
  border:none;
  font-weight:bold;
}

.call{
  background:#1d4ed8;
  color:white;
}

.email{
  background:#dc2626;
  color:white;
}

.quote{
  background:linear-gradient(180deg,#091225,#0b1730);
  border-radius:20px;
  padding:20px;
  margin-top:20px;
  border:1px solid rgba(0,255,255,.2);
}

input, textarea{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:10px;
}

textarea{
  min-height:120px;
}

.submit{
  background:linear-gradient(135deg,#24dcff,#0b56ff);
  color:white;
}
</style>

</head>

<body>

<div class="wrap">

<div class="hero">
  <h1>Strategic Painting Pros LLC</h1>
  <p>Interior & Exterior • Clean • Sharp • Ready</p>
</div>

<div class="card">
  <button class="btn call" onclick="location.href='tel:9565738659'">Call Now</button>
  <button class="btn email" onclick="location.href='mailto:Strategicppros@gmail.com'">Email for Quote</button>
</div>

<div class="quote">
  <h2>Request a Quote</h2>
  <p>Tell us what you need and how to reach you.</p>

  <form action="https://formsubmit.co/Strategicppros@gmail.com" method="POST">
    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="name" placeholder="Your name" required>
    <input type="tel" name="phone" placeholder="Phone number" required>
    <input type="text" name="area" placeholder="Job area">
    <textarea name="details" placeholder="Describe the job..." required></textarea>

    <button class="btn submit">Get My Quote</button>
  </form>
</div>

</div>

</body>
</html>
